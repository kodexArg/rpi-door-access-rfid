<tr id="account-{{ acc.account_id }}"
    class="border-t border-slate-800 hover:bg-slate-900/60 transition-colors">
    <td class="px-4 py-3 font-mono text-sm text-slate-200">{{ acc.account_id }}</td>
    <td class="px-4 py-3">
        {% if acc.status == 'active' %}
        <span class="inline-flex items-center gap-1.5 rounded-full bg-emerald-500/10 px-2.5 py-0.5
                     text-xs font-medium text-emerald-400 ring-1 ring-inset ring-emerald-500/20">
            <span class="h-1.5 w-1.5 rounded-full bg-emerald-400"></span>
            Active
        </span>
        {% else %}
        <span class="inline-flex items-center gap-1.5 rounded-full bg-rose-500/10 px-2.5 py-0.5
                     text-xs font-medium text-rose-400 ring-1 ring-inset ring-rose-500/20">
            <span class="h-1.5 w-1.5 rounded-full bg-rose-400"></span>
            Inactive
        </span>
        {% endif %}
    </td>
    <td class="px-4 py-3 text-sm text-slate-400">{{ acc.expiration_date.strftime('%Y-%m-%d %H:%M') }}</td>
    <td class="px-4 py-3">
        <span class="font-mono text-sm font-semibold text-slate-100">{{ acc.credits }}</span>
    </td>
    <td class="px-4 py-3 text-right">
        <button type="button"
                hx-post="/ui/accounts/{{ acc.account_id }}/recharge"
                hx-vals='{"amount": "5"}'
                hx-target="#account-{{ acc.account_id }}"
                hx-swap="outerHTML"
                class="inline-flex items-center gap-1 rounded-md bg-emerald-600/20 hover:bg-emerald-600/30
                       px-3 py-1.5 text-xs font-medium text-emerald-300 ring-1 ring-inset ring-emerald-500/30
                       transition-colors">
            +5 credits
        </button>
    </td>
</tr>
