{% if users %}
    {% for u in users %}
    <div class="px-4 py-3 cursor-pointer hover:bg-slate-800/60 transition-colors"
         hx-get="/ui/users/{{ u.id }}/detail"
         hx-target="#user-detail-panel"
         hx-swap="innerHTML"
         @click="selectedUserId = {{ u.id }}"
         :class="selectedUserId === {{ u.id }} ? 'bg-indigo-600/10 border-l-2 border-indigo-500 pl-3' : 'border-l-2 border-transparent'">
        <p class="text-sm font-medium text-slate-100">{{ u.first_name }} {{ u.last_name }}</p>
        <p class="text-xs text-slate-500">{{ u.company.name if u.company else '—' }}</p>
    </div>
    {% endfor %}
{% else %}
    <div class="px-4 py-8 text-center text-sm text-slate-600">Sin resultados</div>
{% endif %}
