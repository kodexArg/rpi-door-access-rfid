<!-- Tab 2: Selección de usuario + tarjetas -->
<div class="grid grid-cols-1 lg:grid-cols-5 gap-5 min-h-[600px]"
     x-data="{ selectedUserId: null }">

    <!-- Left: search + user list -->
    <div class="lg:col-span-2 bg-slate-900 border border-slate-800 rounded-xl flex flex-col overflow-hidden">
        <div class="p-4 border-b border-slate-800">
            <input type="text"
                   name="q"
                   placeholder="Buscar usuario..."
                   autocomplete="off"
                   hx-get="/ui/users/search"
                   hx-trigger="input changed delay:300ms, keyup[key=='Enter']"
                   hx-target="#user-list-body"
                   hx-swap="innerHTML"
                   class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
        </div>
        <div id="user-list-body" class="overflow-y-auto flex-1 divide-y divide-slate-800">
            {% include "_user_search_results.html" %}
        </div>
    </div>

    <!-- Right: user detail panel -->
    <div class="lg:col-span-3 bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
        <div id="user-detail-panel" class="h-full">
            <div class="flex items-center justify-center h-full py-20 text-slate-600 text-sm">
                Seleccioná un usuario para ver sus tarjetas
            </div>
        </div>
    </div>

</div>
