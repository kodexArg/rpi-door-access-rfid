<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RPi Door Access{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/dist/app.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx-ext-sse@2.2.2/sse.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 antialiased"
      x-data="{ toasts: [],
                pushToast(msg, kind) {
                    const id = Date.now() + Math.random();
                    this.toasts.push({ id, msg, kind: kind || 'info' });
                    setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, 4000);
                } }"
      @account-created.window="pushToast('Account created', 'success')"
      @htmx:response-error.window="pushToast('Request failed', 'error')">

{% block body %}{% endblock %}

<div class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
    <template x-for="t in toasts" :key="t.id">
        <div class="pointer-events-auto rounded-lg px-4 py-3 shadow-lg text-sm font-medium"
             :class="{
                 'bg-emerald-600 text-white': t.kind === 'success',
                 'bg-rose-600 text-white':    t.kind === 'error',
                 'bg-slate-800 text-slate-100 border border-slate-700': t.kind === 'info'
             }"
             x-text="t.msg"
             x-transition.opacity></div>
    </template>
</div>

</body>
</html>
