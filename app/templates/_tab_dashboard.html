<!-- Tab 1: Dashboard — KPIs + live event feed. KPIs update reactively via SSE `kpi` event. -->
<div class="space-y-6"
     hx-ext="sse"
     sse-connect="/sse/events">

    <!-- KPI Cards (SSE-reactive: swapped on every swipe) -->
    <div id="kpi-cards"
         sse-swap="kpi"
         hx-swap="innerHTML">
        {% include "_kpi_cards.html" %}
    </div>

    <!-- Live event feed -->
    {% include "_recent_events.html" %}

</div>
