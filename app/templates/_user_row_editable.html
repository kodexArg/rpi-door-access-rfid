{% import "_nationality.html" as nat %}
<div id="user-row-{{ u.id }}" class="flex items-center justify-between px-5 py-3 hover:bg-sky-50 transition-colors">
    <div>
        <p class="text-sm font-semibold text-slate-800">
            <span class="mr-1">{{ nat.flag(u.nationality) }}</span>
            {{ u.first_name }} {{ u.last_name }}
        </p>
        <p class="text-xs text-slate-400">
            {{ u.company.name if u.company else '—' }}
            {% if u.document_number %} · {{ u.document_type or 'Doc' }} {{ u.document_number }}{% endif %}
            {% if u.email %} · {{ u.email }}{% endif %}
        </p>
    </div>
    <button hx-delete="/ui/users/{{ u.id }}"
            hx-target="#user-row-{{ u.id }}"
            hx-swap="outerHTML"
            hx-confirm="¿Eliminar a {{ u.first_name }} {{ u.last_name }}? Esta acción es irreversible."
            class="text-xs text-slate-400 hover:text-rose-500 px-2 py-1 rounded-lg hover:bg-rose-50 transition-colors">
        Eliminar
    </button>
</div>
