{% extends "_layout.html" %}
{% block title %}RPi Door Access — Login{% endblock %}

{% block body %}
<main class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
        <h2 class="text-2xl font-semibold text-center mb-6 tracking-tight">Admin Login</h2>

        <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-xl">
            <form action="/ui/login" method="POST" class="space-y-4">
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-300 mb-1">Password</label>
                    <input id="password" type="password" name="password" required autofocus
                           class="w-full rounded-md bg-slate-950 border border-slate-700 px-3 py-2
                                  text-slate-100 placeholder-slate-500
                                  focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                </div>
                <button type="submit"
                        class="w-full rounded-md bg-indigo-600 hover:bg-indigo-500
                               px-4 py-2 text-sm font-medium text-white
                               transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-400">
                    Login
                </button>
            </form>
        </div>
    </div>
</main>
{% endblock %}
