<div class="bg-white border border-sky-100 rounded-2xl overflow-hidden shadow-sm"
     x-data="{ live: false }"
     @htmx:sse-open.window="live = true"
     @htmx:sse-error.window="live = false"
     @htmx:sse-close.window="live = false">

    <div class="flex items-center justify-between px-5 py-3 border-b border-sky-100">
        <h2 class="text-sm font-semibold uppercase tracking-wider text-sky-600">Actividad reciente</h2>
        <span class="inline-flex items-center gap-1.5 text-xs font-medium"
              :class="live ? 'text-emerald-600' : 'text-slate-400'">
            <span class="h-2 w-2 rounded-full"
                  :class="live ? 'bg-emerald-400 animate-pulse' : 'bg-slate-300'"></span>
            <span x-text="live ? 'En vivo' : 'Desconectado'"></span>
        </span>
    </div>

    <div id="events-list"
         class="divide-y divide-sky-50 max-h-96 overflow-y-auto"
         sse-swap="swipe,account_created,account_recharged"
         hx-swap="afterbegin">
        <div class="px-5 py-8 text-center text-sm text-slate-400">
            Esperando actividad…
        </div>
    </div>
</div>
