<div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden"
     x-data="{ live: false }"
     @htmx:sse-open.window="live = true"
     @htmx:sse-error.window="live = false"
     @htmx:sse-close.window="live = false">

    <div class="flex items-center justify-between px-4 py-3 border-b border-slate-800">
        <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-400">Recent events</h2>
        <span class="inline-flex items-center gap-1.5 text-xs font-medium"
              :class="live ? 'text-emerald-400' : 'text-slate-500'">
            <span class="h-2 w-2 rounded-full"
                  :class="live ? 'bg-emerald-400 animate-pulse' : 'bg-slate-600'"></span>
            <span x-text="live ? 'Live' : 'Offline'"></span>
        </span>
    </div>

    <div id="events-list"
         class="divide-y divide-slate-800 max-h-96 overflow-y-auto"
         sse-swap="swipe,account_created,account_recharged"
         hx-swap="afterbegin">
        <div class="px-4 py-6 text-center text-sm text-slate-500">
            Waiting for activity…
        </div>
    </div>
</div>
