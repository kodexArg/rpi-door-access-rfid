{% for company in companies %}
<div id="company-row-{{ company.id }}" class="flex items-center justify-between px-5 py-3 hover:bg-sky-50 transition-colors">
    <p class="text-sm font-semibold text-slate-800">{{ company.name }}</p>
    {% if company.name == "Particulares" %}
    <span class="text-xs text-slate-400 px-2 py-1">Protegida</span>
    {% else %}
    <button hx-delete="/ui/companies/{{ company.id }}"
            hx-target="#company-list-body"
            hx-swap="innerHTML"
            hx-confirm="¿Eliminar empresa '{{ company.name }}'?"
            class="text-xs text-slate-400 hover:text-rose-500 px-2 py-1 rounded-lg hover:bg-rose-50 transition-colors">
        Eliminar
    </button>
    {% endif %}
</div>
{% else %}
<div class="px-5 py-8 text-center text-sm text-slate-400">No hay empresas registradas.</div>
{% endfor %}
