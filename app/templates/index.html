{% extends "_layout.html" %}
{% block title %}RPi Door Access{% endblock %}

{% block body %}
<div class="min-h-screen"
     x-data="{
         activeTab: 'dashboard',
         selectedUserId: null,
         switchTab(tab) { this.activeTab = tab; }
     }">

    <header class="border-b border-slate-800 bg-slate-900/60 backdrop-blur sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-6 py-0 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2.5 py-4 mr-2">
                    <div class="h-7 w-7 rounded-md bg-indigo-600 flex items-center justify-center text-white text-xs font-bold">RF</div>
                    <span class="text-sm font-semibold tracking-tight text-slate-200">RFID Access</span>
                </div>
                <!-- Tab nav -->
                <nav class="flex h-full">
                    <button @click="switchTab('dashboard')"
                            class="px-4 py-4 text-sm font-medium border-b-2 transition-colors"
                            :class="activeTab === 'dashboard'
                                ? 'border-indigo-500 text-indigo-400'
                                : 'border-transparent text-slate-400 hover:text-slate-200 hover:border-slate-600'">
                        Dashboard
                    </button>
                    <button @click="switchTab('usuarios')"
                            class="px-4 py-4 text-sm font-medium border-b-2 transition-colors"
                            :class="activeTab === 'usuarios'
                                ? 'border-indigo-500 text-indigo-400'
                                : 'border-transparent text-slate-400 hover:text-slate-200 hover:border-slate-600'">
                        Usuarios
                    </button>
                    <button @click="switchTab('datos')"
                            class="px-4 py-4 text-sm font-medium border-b-2 transition-colors"
                            :class="activeTab === 'datos'
                                ? 'border-indigo-500 text-indigo-400'
                                : 'border-transparent text-slate-400 hover:text-slate-200 hover:border-slate-600'">
                        Administración
                    </button>
                    <button @click="switchTab('logs')"
                            class="px-4 py-4 text-sm font-medium border-b-2 transition-colors"
                            :class="activeTab === 'logs'
                                ? 'border-indigo-500 text-indigo-400'
                                : 'border-transparent text-slate-400 hover:text-slate-200 hover:border-slate-600'">
                        Logs
                    </button>
                </nav>
            </div>
            <form action="/ui/logout" method="GET">
                <button class="text-xs text-slate-500 hover:text-slate-300 transition-colors px-2 py-1">Salir</button>
            </form>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-6">

        <!-- Tab 1: Dashboard — x-show preserves DOM so SSE stays connected -->
        <div x-show="activeTab === 'dashboard'" x-cloak>
            {% include "_tab_dashboard.html" %}
        </div>

        <!-- Tab 2: Usuarios -->
        <div x-show="activeTab === 'usuarios'" x-cloak>
            {% include "_tab_users.html" %}
        </div>

        <!-- Tab 3: Datos -->
        <div x-show="activeTab === 'datos'" x-cloak>
            {% include "_tab_data.html" %}
        </div>

        <!-- Tab 4: Logs — lazy loaded on first reveal -->
        <div x-show="activeTab === 'logs'" x-cloak
             hx-get="/ui/logs"
             hx-trigger="intersect once"
             hx-swap="innerHTML">
            <div class="flex items-center justify-center py-20 text-slate-600 text-sm">Cargando logs...</div>
        </div>

    </main>
</div>
{% endblock %}
