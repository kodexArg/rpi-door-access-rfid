<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPi Door Access Dashboard</title>
    <!-- Simple bootstrap for quick UI -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="mb-4">RFID Door Access Control</h1>
    
    <div class="card mb-4">
        <div class="card-header">Add New Card</div>
        <div class="card-body">
            <form action="/ui/accounts/create" method="POST">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label for="account_id" class="form-label">Card ID</label>
                        <input type="text" class="form-control" name="account_id" required>
                    </div>
                    <div class="col-md-3">
                        <label for="status" class="form-label">Status</label>
                        <select class="form-select" name="status">
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="credits" class="form-label">Initial Credits</label>
                        <input type="number" class="form-control" name="credits" value="10" required>
                    </div>
                    <div class="col-md-3">
                        <label for="expiration_date" class="form-label">Expiration Date</label>
                        <input type="datetime-local" class="form-control" name="expiration_date" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary mt-3">Add Account</button>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header">Managed Accounts</div>
        <div class="card-body">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Status</th>
                        <th>Expiration</th>
                        <th>Credits</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for acc in accounts %}
                    <tr>
                        <td>{{ acc.account_id }}</td>
                        <td>
                            <span class="badge {% if acc.status == 'active' %}bg-success{% else %}bg-danger{% endif %}">
                                {{ acc.status|capitalize }}
                            </span>
                        </td>
                        <td>{{ acc.expiration_date }}</td>
                        <td>{{ acc.credits }}</td>
                        <td>
                            <form action="/ui/accounts/{{ acc.account_id }}/recharge" method="POST" class="d-inline">
                                <input type="hidden" name="amount" value="5">
                                <button type="submit" class="btn btn-sm btn-outline-success">+5 Credits</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                    {% if not accounts %}
                    <tr><td colspan="5" class="text-center">No accounts found.</td></tr>
                    {% endif %}
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
