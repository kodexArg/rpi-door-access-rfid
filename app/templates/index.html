{% extends "_layout.html" %}
{% block title %}Parador Km1151 — Duchas{% endblock %}

{% block body %}
<div class="min-h-screen"
     x-data="{
         activeTab: 'dashboard',
         selectedUserId: null,
         switchTab(tab) { this.activeTab = tab; }
     }">

    <header class="bg-sky-700 shadow-md sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
            <!-- Brand -->
            <div class="flex items-center gap-5 py-4">
                <span class="font-nunito text-xl font-800 tracking-tight text-white select-none leading-none" style="font-weight:800">PARADOR KM1151 — DUCHAS</span>

                <!-- Tab nav -->
                <nav class="hidden sm:flex h-full ml-2">
                    <button @click="switchTab('dashboard')"
                            class="px-4 py-4 text-sm font-semibold border-b-2 transition-colors"
                            :class="activeTab === 'dashboard'
                                ? 'border-white text-white'
                                : 'border-transparent text-sky-200 hover:text-white hover:border-sky-300'">
                        Dashboard
                    </button>
                    <button @click="switchTab('usuarios')"
                            class="px-4 py-4 text-sm font-semibold border-b-2 transition-colors"
                            :class="activeTab === 'usuarios'
                                ? 'border-white text-white'
                                : 'border-transparent text-sky-200 hover:text-white hover:border-sky-300'"
                            hx-get="/ui/users/search"
                            hx-target="#user-list-body"
                            hx-trigger="click[activeTab!='usuarios'] once">
                        Usuarios
                    </button>
                    <button @click="switchTab('datos')"
                            class="px-4 py-4 text-sm font-semibold border-b-2 transition-colors"
                            :class="activeTab === 'datos'
                                ? 'border-white text-white'
                                : 'border-transparent text-sky-200 hover:text-white hover:border-sky-300'">
                        Administración
                    </button>
                    <button @click="switchTab('logs')"
                            class="px-4 py-4 text-sm font-semibold border-b-2 transition-colors"
                            :class="activeTab === 'logs'
                                ? 'border-white text-white'
                                : 'border-transparent text-sky-200 hover:text-white hover:border-sky-300'">
                        Logs
                    </button>
                </nav>
            </div>

            <form action="/ui/logout" method="GET">
                <button class="text-xs text-sky-200 hover:text-white transition-colors px-2 py-1 rounded hover:bg-sky-600">Salir</button>
            </form>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-6">

        <!-- Tab 1: Dashboard -->
        <div x-show="activeTab === 'dashboard'" x-cloak>
            {% include "_tab_dashboard.html" %}
        </div>

        <!-- Tab 2: Usuarios -->
        <div x-show="activeTab === 'usuarios'" x-cloak>
            {% include "_tab_users.html" %}
        </div>

        <!-- Tab 3: Datos -->
        <div x-show="activeTab === 'datos'" x-cloak>
            {% include "_tab_data.html" %}
        </div>

        <!-- Tab 4: Logs — lazy loaded on first reveal -->
        <div x-show="activeTab === 'logs'" x-cloak
             hx-get="/ui/logs"
             hx-trigger="intersect once"
             hx-swap="innerHTML">
            <div class="flex items-center justify-center py-20 text-slate-400 text-sm">Cargando logs...</div>
        </div>

    </main>
</div>
{% endblock %}
