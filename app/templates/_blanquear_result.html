{% if count > 0 %}
<div class="mt-3 flex items-center gap-2 text-sm text-emerald-700 bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-3">
    <span>✓</span>
    <span>{{ count }} tarjeta{{ 's' if count != 1 else '' }} desvinculada{{ 's' if count != 1 else '' }} correctamente.</span>
</div>
{% else %}
<div class="mt-3 flex items-center gap-2 text-sm text-slate-500 bg-sky-50 border border-sky-100 rounded-xl px-4 py-3">
    <span>No se encontraron tarjetas con esos UIDs en el sistema.</span>
</div>
{% endif %}
